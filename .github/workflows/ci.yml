name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      # tsc --noEmit + saf motor testleri + sıfır-bağımlılık sunucu testleri
      - run: npm test
      # üretim hazırlık kontrolü (gerçek bozuklukta hata; uyarılar bloklamaz)
      - run: npm run preflight
